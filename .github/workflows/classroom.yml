name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Border Formatting Check
      id: border-formatting-check
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Border Formatting Check
        setup-command: ''
        command: javac src/Main.java && java -cp src Main
        input: ''
        expected-output: "\\*|--"
        comparison-method: regex
        timeout: 2
        max-score: 40
    - name: Checks for NAME
      id: checks-for-name
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Checks for NAME
        setup-command: ''
        command: javac src/Main.java && java -cp src Main
        input: ''
        expected-output: NAME
        comparison-method: contains
        timeout: 2
        max-score: 20
    - name: Checks for ROLE
      id: checks-for-role
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Checks for ROLE
        setup-command: ''
        command: javac src/Main.java && java -cp src Main
        input: ''
        expected-output: ROLE
        comparison-method: contains
        timeout: 2
        max-score: 20
    - name: Checks for DEPT
      id: checks-for-dept
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Checks for DEPT
        setup-command: ''
        command: javac src/Main.java && java -cp src Main
        input: ''
        expected-output: DEPT
        comparison-method: contains
        timeout: 2
        max-score: 20
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        BORDER-FORMATTING-CHECK_RESULTS: "${{steps.border-formatting-check.outputs.result}}"
        CHECKS-FOR-NAME_RESULTS: "${{steps.checks-for-name.outputs.result}}"
        CHECKS-FOR-ROLE_RESULTS: "${{steps.checks-for-role.outputs.result}}"
        CHECKS-FOR-DEPT_RESULTS: "${{steps.checks-for-dept.outputs.result}}"
      with:
        runners: border-formatting-check,checks-for-name,checks-for-role,checks-for-dept
